name: AEGIS Validation

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Validation Gates
        run: |
          chmod +x bin/*.sh
          ./bin/Validation_Gates.sh .

      - name: Check Dependencies
        run: |
          ./bin/Dependency_Check.sh .

  hostile-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Alpine Test
        run: |
          chmod +x bin/*.sh
          docker run --rm -v $PWD:/app alpine:latest /bin/sh -c "cd /app && chmod +x bin/*.sh && ./bin/Hostile_Env_Test.sh ."

      - name: Busybox Test
        run: |
          docker run --rm -v $PWD:/app busybox:latest /bin/sh -c "cd /app && chmod +x bin/*.sh && ./bin/Hostile_Env_Test.sh ."

      - name: Debian Oldstable Test
        run: |
          docker run --rm -v $PWD:/app debian:oldstable /bin/sh -c "cd /app && chmod +x bin/*.sh && ./bin/Validation_Gates.sh ."

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: |
          chmod +x bin/*.sh
          for f in bin/*.sh; do
            shellcheck "$f" || exit 1
          done

  portability:
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - uses: actions/checkout@v4
      - name: POSIX Compliance
        run: |
          chmod +x bin/*.sh 2>/dev/null || true
          for f in bin/*.sh; do
            sh -n "$f" || exit 1
          done
